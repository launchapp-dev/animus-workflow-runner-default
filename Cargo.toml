[package]
name = "animus-workflow-runner-default"
version = "0.4.4"
edition = "2021"
description = "Reference workflow_runner plugin for Animus v0.5 (stdio JSON-RPC + direct-execute CLI; thin wrapper over animus-runtime-shared)"
license = "Elastic-2.0"
repository = "https://github.com/launchapp-dev/animus-workflow-runner-default"

[lib]
name = "animus_workflow_runner_default"
path = "src/lib.rs"

[[bin]]
name = "animus-workflow-runner-default"
path = "src/main.rs"

[dependencies]
# --- v0.5 protocol crates (tagged at animus-protocol v0.5.1) ----------------
animus-plugin-protocol      = { git = "https://github.com/launchapp-dev/animus-protocol", tag = "v0.5.1" }
animus-subject-protocol     = { git = "https://github.com/launchapp-dev/animus-protocol", tag = "v0.5.1" }
animus-workflow-runner-protocol = { git = "https://github.com/launchapp-dev/animus-protocol", tag = "v0.5.1" }
animus-plugin-runtime       = { git = "https://github.com/launchapp-dev/animus-protocol", tag = "v0.5.1" }

# --- ao-cli helper crates (pinned to animus-cli main, post-v0.5.14) ---------
# v0.4.4: repinned to a1a9a029 (the v0.5.14 line). `agent-runner`,
# `orchestrator-store`, `orchestrator-providers`, `orchestrator-git-ops`,
# and `orchestrator-notifications` were deleted/folded upstream
# (store -> orchestrator_core::store, the git provider is vendored here
# as src/git_provider.rs, the agent-runner sidecar was removed in v0.5.3).
protocol                   = { git = "https://github.com/launchapp-dev/animus-cli", rev = "a1a9a0296b37ab712dc0428a28e32b867519543e", package = "protocol" }
orchestrator-plugin-host   = { git = "https://github.com/launchapp-dev/animus-cli", rev = "a1a9a0296b37ab712dc0428a28e32b867519543e" }
# Session backend types (SessionRequest / SessionEvent) — pinned to the SAME
# animus-protocol tag the animus-cli workspace pins at a1a9a029 so cargo
# unifies this crate with orchestrator-plugin-host's own dependency (type
# identity matters: SessionRequest values cross the crate boundary).
animus-session-backend     = { git = "https://github.com/launchapp-dev/animus-protocol", tag = "v0.1.13" }
orchestrator-core          = { git = "https://github.com/launchapp-dev/animus-cli", rev = "a1a9a0296b37ab712dc0428a28e32b867519543e" }
orchestrator-config        = { git = "https://github.com/launchapp-dev/animus-cli", rev = "a1a9a0296b37ab712dc0428a28e32b867519543e" }
orchestrator-logging       = { git = "https://github.com/launchapp-dev/animus-cli", rev = "a1a9a0296b37ab712dc0428a28e32b867519543e" }

# v0.4.1: shared runtime modules consumed from out-of-tree
# `launchapp-dev/animus-runtime-shared`. The plugin re-exports the shared
# surface via `lib.rs` so existing downstream consumers stay source-compat.
# v0.4.4: the canonical animus-runtime-shared now lives vendored inside
# the animus-cli workspace (`crates/animus-runtime-shared`); pinning the
# git dep at the same animus-cli rev unifies the whole dependency graph
# on one source and picks up the phase-skills + skill-metadata APIs
# (load_workflow_skills_payload_from_env, phase_skills_resolution,
# apply_phase_skills, inject_skill_mcp_servers,
# populate_phase_skills_metadata, persist_phase_output_with_metadata).
animus-runtime-shared      = { git = "https://github.com/launchapp-dev/animus-cli", rev = "a1a9a0296b37ab712dc0428a28e32b867519543e" }

# --- stdlib-ish deps (still needed by plugin-only modules) ------------------
anyhow = "1.0"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.5", features = ["derive"] }
dirs = "5"
jsonschema = "0.45"
regex = "1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-std", "io-util", "process", "time", "net", "sync"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
assert_cmd = "2.0"
tempfile = "3.10"
animus-runtime-shared      = { git = "https://github.com/launchapp-dev/animus-cli", rev = "a1a9a0296b37ab712dc0428a28e32b867519543e", features = ["test-fault"] }

# v0.5 lift: mirror the relevant relaxations from ao-cli's workspace lints
# so the (byte-identical) lifted modules clear `clippy -- -D warnings`. As
# the standalone package matures these allowances can be tightened
# function-by-function.
[lints.rust]
unsafe_code = "deny"
unused_must_use = "warn"

[lints.clippy]
too_many_arguments = "allow"
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
doc_markdown = "allow"
struct_excessive_bools = "allow"
too_many_lines = "allow"
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
cast_precision_loss = "allow"
cast_lossless = "allow"
similar_names = "allow"
wildcard_imports = "allow"

# --- Local dev path overrides (untracked via .gitignore) --------------------
# See .cargo/config.toml for the `paths` entries that point at sibling
# checkouts during local iteration.

