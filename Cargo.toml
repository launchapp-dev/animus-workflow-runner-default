[package]
name = "animus-workflow-runner-default"
version = "0.4.3"
edition = "2021"
description = "Reference workflow_runner plugin for Animus v0.5 (stdio JSON-RPC + direct-execute CLI; thin wrapper over animus-runtime-shared)"
license = "Elastic-2.0"
repository = "https://github.com/launchapp-dev/animus-workflow-runner-default"

[lib]
name = "animus_workflow_runner_default"
path = "src/lib.rs"

[[bin]]
name = "animus-workflow-runner-default"
path = "src/main.rs"

[dependencies]
# --- v0.5 protocol crates (tagged at animus-protocol v0.5.1) ----------------
animus-plugin-protocol      = { git = "https://github.com/launchapp-dev/animus-protocol", tag = "v0.5.1" }
animus-subject-protocol     = { git = "https://github.com/launchapp-dev/animus-protocol", tag = "v0.5.1" }
animus-workflow-runner-protocol = { git = "https://github.com/launchapp-dev/animus-protocol", tag = "v0.5.1" }
animus-plugin-runtime       = { git = "https://github.com/launchapp-dev/animus-protocol", tag = "v0.5.1" }

# --- ao-cli helper crates (pinned to agent/workflow-runner-default/v0.4-mcp-passdown:
# the e02ae75 base + the MCP pass-down fixes: additional-server headers,
# typed SessionRequest.mcp_servers, non-enforced additional-server injection) -
agent-runner               = { git = "https://github.com/launchapp-dev/animus-cli", rev = "eb3868cf9ffe805368da4df72f8a08becfe15dcc" }
protocol                   = { git = "https://github.com/launchapp-dev/animus-cli", rev = "eb3868cf9ffe805368da4df72f8a08becfe15dcc", package = "protocol" }
orchestrator-core          = { git = "https://github.com/launchapp-dev/animus-cli", rev = "eb3868cf9ffe805368da4df72f8a08becfe15dcc" }
orchestrator-config        = { git = "https://github.com/launchapp-dev/animus-cli", rev = "eb3868cf9ffe805368da4df72f8a08becfe15dcc" }
orchestrator-store         = { git = "https://github.com/launchapp-dev/animus-cli", rev = "eb3868cf9ffe805368da4df72f8a08becfe15dcc" }
orchestrator-providers     = { git = "https://github.com/launchapp-dev/animus-cli", rev = "eb3868cf9ffe805368da4df72f8a08becfe15dcc" }
orchestrator-git-ops       = { git = "https://github.com/launchapp-dev/animus-cli", rev = "eb3868cf9ffe805368da4df72f8a08becfe15dcc" }
orchestrator-notifications = { git = "https://github.com/launchapp-dev/animus-cli", rev = "eb3868cf9ffe805368da4df72f8a08becfe15dcc" }
orchestrator-logging       = { git = "https://github.com/launchapp-dev/animus-cli", rev = "eb3868cf9ffe805368da4df72f8a08becfe15dcc" }

# v0.4.1: shared runtime modules consumed from out-of-tree
# `launchapp-dev/animus-runtime-shared`. The plugin re-exports the shared
# surface via `lib.rs` so existing downstream consumers stay source-compat.
# v0.4.2: pinned to the `pin-mcp-passdown-v0.4` rev (v0.1.1 + animus-cli
# pins bumped to the mcp-passdown rev) so the whole graph unifies on one
# animus-cli source.
# v0.4.3: pin-mcp-passdown-v0.4 advanced to ffccb72 — adds
# WorkflowPhaseRuntimeSettings.permission_mode and the
# --agent-id/--workflow-id-pinned MCP serve injection; the animus-cli pins
# move to eb3868cf (animus-session-backend v0.1.13.5: permission_mode +
# extras.approvals on the session request, contract-launch overrides,
# InteractionRequested/InteractionResolved events).
animus-runtime-shared      = { git = "https://github.com/launchapp-dev/animus-runtime-shared", rev = "ffccb72c3d63c61e94134cc05b02cbf5ed1c31a0" }

# --- stdlib-ish deps (still needed by plugin-only modules) ------------------
anyhow = "1.0"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.5", features = ["derive"] }
dirs = "5"
jsonschema = "0.45"
regex = "1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-std", "io-util", "process", "time", "net", "sync"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
assert_cmd = "2.0"
tempfile = "3.10"
animus-runtime-shared      = { git = "https://github.com/launchapp-dev/animus-runtime-shared", rev = "ffccb72c3d63c61e94134cc05b02cbf5ed1c31a0", features = ["test-fault"] }

# v0.5 lift: mirror the relevant relaxations from ao-cli's workspace lints
# so the (byte-identical) lifted modules clear `clippy -- -D warnings`. As
# the standalone package matures these allowances can be tightened
# function-by-function.
[lints.rust]
unsafe_code = "deny"
unused_must_use = "warn"

[lints.clippy]
too_many_arguments = "allow"
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
doc_markdown = "allow"
struct_excessive_bools = "allow"
too_many_lines = "allow"
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
cast_precision_loss = "allow"
cast_lossless = "allow"
similar_names = "allow"
wildcard_imports = "allow"

# --- Local dev path overrides (untracked via .gitignore) --------------------
# See .cargo/config.toml for the `paths` entries that point at sibling
# checkouts during local iteration.

